<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Looper</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="player-card"> <!-- EMPTY WRAPPER DIV -->


            <label for="vlink">Video Link:</label>
            <input type="text" id="vlink" name="vlink" required>
            <button id="mySubmit">submit</button>
            

        <div class="video-wrapper"> <!-- WHERE THE API WILL INSERT THE CONTAINER-->
            <div class="player" id="player"></div>
        </div>

        <button id="setStart">Set Loop Start</button>
        <label id="lStartTime">NONE</label>
        
        <button id="setEnd">Set Loop End</button>
        <label id="lEndTime">NONE</label>
        
        <button id="resetLoop">Reset Loop</button>

    </div>

    <script src ="script.js"></script>
    <script src ="https://www.youtube.com/iframe_api"></script>
    
</body>

</html>
